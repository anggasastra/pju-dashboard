<!DOCTYPE html>
<html>
<body>
  <h1>Data PJU: <span id="status">-</span></h1>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    socket.on('data', (msg) => {
      const data = JSON.parse(msg);
      document.getElementById('status').innerText = data.status;
    });
  </script>
</body>
</html>
